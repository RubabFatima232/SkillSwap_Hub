{% extends 'base.html' %}

{% block title %}Login - SkillSwap Hub{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-lg border-0">
                <div class="card-body p-5">
                    <h2 class="card-title text-center mb-4 fw-bold">
                        <i class="fas fa-sign-in-alt text-primary"></i> Welcome Back
                    </h2>

                    <form method="POST" action="{{ url_for('login') }}" id="loginForm">
                        <!-- Email Field -->
                        <div class="mb-3">
                            <label for="email" class="form-label fw-semibold">Email Address</label>
                            <input 
                                type="email" 
                                class="form-control form-control-lg" 
                                id="email" 
                                name="email" 
                                placeholder="your@email.com"
                                required>
                        </div>

                        <!-- Password Field -->
                        <div class="mb-4">
                            <label for="password" class="form-label fw-semibold">Password</label>
                            <input 
                                type="password" 
                                class="form-control form-control-lg" 
                                id="password" 
                                name="password" 
                                placeholder="Enter your password"
                                required>
                        </div>

                        <!-- Submit Button -->
                        <button type="submit" class="btn btn-primary btn-lg w-100 fw-semibold">
                            <i class="fas fa-sign-in-alt"></i> Login to Account
                        </button>

                        <!-- Divider -->
                        <hr class="my-4">

                        <!-- Signup Link -->
                        <p class="text-center text-muted">
                            Don't have an account? 
                            <a href="{{ url_for('signup') }}" class="text-primary fw-semibold text-decoration-none">
                                Create one here
                            </a>
                        </p>
                    </form>
                </div>
            </div>

            <!-- Demo Credentials (Optional) -->
            <div class="alert alert-info mt-4" role="alert">
                <h6 class="alert-heading"><i class="fas fa-info-circle"></i> Demo Account</h6>
                <p class="small mb-1">Email: demo@example.com</p>
                <p class="small mb-0">Password: password123</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
