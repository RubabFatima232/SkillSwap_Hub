{% extends 'base.html' %}

{% block title %}Page Not Found - SkillSwap Hub{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center text-center">
        <div class="col-md-6">
            <h1 class="display-1 fw-bold text-danger mb-4">404</h1>
            <h2 class="display-5 mb-3">Page Not Found</h2>
            <p class="lead text-muted mb-4">
                The page you're looking for doesn't exist or has been moved.
            </p>
            <div class="d-flex gap-2 justify-content-center">
                <a href="{{ url_for('index') }}" class="btn btn-primary btn-lg">
                    <i class="fas fa-home"></i> Go to Home
                </a>
                <a href="{{ url_for('search') }}" class="btn btn-outline-primary btn-lg">
                    <i class="fas fa-search"></i> Browse Skills
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
